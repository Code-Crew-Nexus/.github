name: Bug Report
description: Report a problem in a repository, workflow, setup, or implementation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue.

        Please make sure you have read the repository README and gathered enough context before submitting this report.
  - type: input
    id: repository_name
    attributes:
      label: Repository
      description: Which repository is affected?
      placeholder: Example: DAA-Lab or campus-portal
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Bug Summary
      description: What is the issue?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can someone reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Add screenshots, logs, environment details, or anything else helpful.
